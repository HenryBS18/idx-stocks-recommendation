services:
  core-api:
    container_name: core-api
    build: ./backend/core
    restart: unless-stopped
    env_file:
      - ./backend/core/.env.prod
    ports:
      - "4000:4000"
    depends_on:
      - stock-data-api
      - redis
  stock-data-api:
    container_name: stock-data-api
    build: ./backend/stock_data
    restart: unless-stopped
    env_file:
      - ./backend/stock_data/.env.prod
    ports:
      - "7000:7000"
  redis:
    container_name: redis
    image: redis:7-alpine
    restart: unless-stopped
    command: "redis-server --requirepass ${REDIS_PASSWORD}"
    volumes:
      - redis-volume:/data
  redis-insight:
    container_name: redis-insight-idx
    image: redis/redisinsight
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5541:5540"
    depends_on:
      - redis
  app:
    container_name: app
    build: ./frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env.prod
    ports:
      - "3000:3000"
    depends_on:
      - core-api

volumes:
  redis-volume:
